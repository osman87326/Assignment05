<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <!-- tailwind and daisyui -->
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@5"
    rel="stylesheet"
    type="text/css"
  />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- style -->
   <link rel="stylesheet" href="script/style.css">
</head>
<body class="mx-auto" >
       <!-- search section -->
    <section class="flex-col-reverseitems-center justify-between p-4 sm:flex space-y-4 items-center">
      <section class="flex gap-4 items-center ">
        <div>
          <img src="assets/github-logo.png" alt="" >
        </div>
        <div>
          <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        </div>
      </section>

      <section class="">
      <div class="join">
        <div>
          <label class="input validator join-item">
            
            <input id="searchInput"  type="text" placeholder="Search issues..." required />
          </label>
         
        </div>
        <button id="issueBtn" class="btn btn-primary join-item"><span><i class="fa-solid fa-plus"></i></span>New Issue</button>
      </div>
    </section>
    </section>

    <section>   
 <!-- top button -->
      <section class="mt-12 ml-5 bg-white p-5 justify-around">
        <div>
          <button
            id="all-btn"
            onclick="loadIssueButton(this)"
            class="btn btn-outline btn-primary show"
          >
            All
          </button>
          <button onclick="showOpenCard(this)" class="btn btn-outline btn-primary show">Open</button>
          <button  onclick="showClosedCard(this)" class="btn btn-outline btn-primary show">Close</button>
        </div>
      </section>


      <!-- issues-container -->
      <div class="flex justify-between p-10 bg-white border-purple-600 p-4">
        <div class="flex gap-8">
          <img
            src="assets/Aperture.png"
            alt=""
            class="bg-purple-200 p-4 rounded-s-3xl"
          />
          <div>
            <h1 id="issue-count" onclick="updateState()" class="text-2xl font-bold">50 issues</h1>
            <p class="font-semibold">Track and manage your project issues</p>
          </div>
        </div>
        <div>
          <p class="flex gap-4">
            <span><img src="assets/Open-Status.png" alt="" /></span>Open
          </p>
          <p class="flex gap-4">
            <span><img src="assets/Closed- Status .png" alt="" /></span>Closed
          </p>
        </div>
      </div>
</body>
</html>
